<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock 7simul Flip 学习助手</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 16px;
        color: #cbd5e1;
      }

      form {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      input[type="number"] {
        width: 100px;
        padding: 8px 10px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
      }

      textarea {
        width: 100%;
        min-height: 76px;
        padding: 10px 12px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        font-weight: 600;
        cursor: pointer;
        background: #38bdf8;
        color: #0f172a;
      }

      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .secondary {
        background: #334155;
        color: #e2e8f0;
      }

      .status {
        margin: 6px 0 16px;
        color: #94a3b8;
      }

      .panel {
        border: 1px solid #334155;
        border-radius: 10px;
        background: #0b1222;
        padding: 12px;
        margin: 0 0 14px;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .inline input[type="checkbox"] {
        transform: translateY(1px);
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .scramble-item {
        padding: 10px 12px;
        border-radius: 8px;
        background: #1e293b;
        border: 1px solid #334155;
      }

      .scramble-text {
        margin: 0 0 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .scramble-preview {
        background: #0b1222;
        border-radius: 8px;
        border: 1px solid #334155;
        padding: 4px;
      }

      .memo-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 8px;
      }

      .strict-restore-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 8px;
      }

      .strict-restore-title {
        margin: 0 0 6px;
        font-weight: 700;
      }

      .strict-step {
        margin-top: 8px;
      }

      .strict-step-title {
        margin: 0 0 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .memo-summary {
        margin: 0;
        font-weight: 700;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .memo-details {
        margin-top: 6px;
      }

      .memo-details summary {
        cursor: pointer;
        color: #93c5fd;
      }

      .memo-table-wrap {
        margin-top: 8px;
        overflow-x: auto;
      }

      .memo-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
        font-size: 0.92rem;
      }

      .memo-table th,
      .memo-table td {
        border: 1px solid #334155;
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }

      .memo-table th {
        background: #162038;
        color: #bfdbfe;
        font-weight: 700;
      }

      .memo-table td:nth-child(1),
      .memo-table td:nth-child(5) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
      }

      .memo-table td:nth-child(2),
      .memo-table td:nth-child(4) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .meta {
        margin-top: 22px;
        color: #94a3b8;
        font-size: 0.92rem;
      }

      code {
        background: #1e293b;
        padding: 1px 4px;
        border-radius: 4px;
      }

      /* Mode tab bar */
      .tab-bar {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-bottom: 2px solid #334155;
      }

      .tab-btn {
        background: transparent;
        color: #94a3b8;
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 0;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn:hover {
        color: #e2e8f0;
      }

      .tab-btn.active {
        color: #38bdf8;
        border-bottom-color: #38bdf8;
      }

      .mode-container {
        display: none;
      }

      .mode-container.visible {
        display: block;
      }

      /* Memo trainer */
      .trainer-scramble {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        color: #e2e8f0;
        padding: 16px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        margin-bottom: 20px;
        word-break: break-word;
      }

      .trainer-timer {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 4rem;
        font-weight: 700;
        margin: 16px 0;
        transition: color 0.15s;
        user-select: none;
      }

      .trainer-timer.color-idle { color: #e2e8f0; }
      .trainer-timer.color-holding { color: #f87171; }
      .trainer-timer.color-ready { color: #4ade80; }
      .trainer-timer.color-running { color: #38bdf8; }
      .trainer-timer.color-dnf { color: #f87171; }
      .trainer-timer.color-valid { color: #4ade80; }

      .trainer-hint {
        text-align: center;
        color: #94a3b8;
        margin-bottom: 16px;
        min-height: 1.5em;
      }

      .trainer-input-area {
        display: none;
        text-align: center;
        margin-bottom: 20px;
      }

      .trainer-input-area.visible {
        display: block;
      }

      .trainer-input {
        width: 240px;
        max-width: 80%;
        padding: 10px 14px;
        border: 2px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
        font-size: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        text-align: center;
        letter-spacing: 0.15em;
      }

      .trainer-input:focus {
        outline: none;
        border-color: #38bdf8;
      }

      .trainer-result {
        text-align: center;
        margin-bottom: 16px;
        min-height: 1.5em;
        font-weight: 600;
      }

      .trainer-config {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
        color: #94a3b8;
        font-size: 0.9rem;
      }

      .trainer-config-sep {
        color: #475569;
      }

      .trainer-preview {
        margin-bottom: 16px;
        border-radius: 10px;
        overflow: hidden;
      }

      .trainer-preview:empty {
        display: none;
      }

      .trainer-config select {
        padding: 4px 8px;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.9rem;
      }

      .trainer-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }

      .stat-label {
        font-size: 0.78rem;
        color: #94a3b8;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .stat-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: #e2e8f0;
      }

      .trainer-results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .trainer-results-header h3 {
        margin: 0;
        font-size: 1rem;
      }

      .trainer-results-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 6px;
        max-height: 400px;
        overflow-y: auto;
      }

      .result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        font-size: 0.92rem;
        cursor: pointer;
      }

      .result-item:hover {
        border-color: #475569;
      }

      .result-index {
        color: #64748b;
        min-width: 2.5em;
        text-align: right;
      }

      .result-time {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-weight: 600;
        min-width: 6em;
      }

      .result-time.dnf {
        color: #f87171;
      }

      .result-date {
        color: #64748b;
        margin-left: auto;
        font-size: 0.82rem;
      }

      .result-detail {
        display: none;
        margin-top: 6px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #cbd5e1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        word-break: break-word;
      }

      .result-detail.visible {
        display: block;
      }

      .result-detail p {
        margin: 2px 0;
        color: #cbd5e1;
      }

      .btn-danger {
        background: #7f1d1d;
        color: #fca5a5;
        font-size: 0.82rem;
        padding: 5px 10px;
      }

      .btn-danger:hover {
        background: #991b1b;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Clock 7simul Flip 学习助手</h1>

      <nav class="tab-bar">
        <button class="tab-btn active" data-mode="learn">学习模式</button>
        <button class="tab-btn" data-mode="trainer">记忆练习</button>
      </nav>

      <div id="mode-learn" class="mode-container visible">

      <p>用于生成打乱、查看记忆编码与模拟执行步骤，辅助你练习和核对 7simul flip。</p>

      <section class="panel">
        <form id="custom-form">
          <label for="custom-scramble">输入一条 Clock 打乱进行学习模式渲染：</label>
          <textarea
            id="custom-scramble"
            name="custom-scramble"
            placeholder="例如：UR1- DR2+ DL0+ UL5- U3+ R2- D1+ L0+ ALL4- y2 U1+ R4- D2+ L3- ALL0+"
          ></textarea>
          <div class="inline">
            <button type="submit">渲染此打乱</button>
            <label class="inline" for="reset-pins">
              <input id="reset-pins" type="checkbox" checked />
              结束时将 pins 全部按下（常见展示方式）
            </label>
            <label class="inline" for="show-strict-restore">
              <input id="show-strict-restore" type="checkbox" />
              显示 7simul flip 执行过程
            </label>
            <label class="inline" for="show-memo-derivation">
              <input id="show-memo-derivation" type="checkbox" />
              显示记忆编码推导
            </label>
            <label class="inline" for="show-strict-details">
              <input id="show-strict-details" type="checkbox" checked />
              显示每一步状态图
            </label>
            <label class="inline" for="show-ghost-hands">
              <input id="show-ghost-hands" type="checkbox" />
              显示橙色虚线（上一步指针）
            </label>
          </div>
        </form>
      </section>

      <form id="scramble-form">
        <label for="count">生成条数：</label>
        <input id="count" name="count" type="number" min="1" max="200" value="1" />
        <button type="submit">生成练习打乱</button>
        <button id="copy-all" type="button" class="secondary" disabled>复制全部</button>
      </form>

      <div id="status" class="status"></div>
      <ol id="output-list" class="list"></ol>

      <p class="meta">
        说明：本工具仅用于 7simul flip 学习与自检；正式比赛请以 WCA 官方打乱程序为准。
      </p>

      </div><!-- /mode-learn -->

      <div id="mode-trainer" class="mode-container">

        <div id="trainer-scramble" class="trainer-scramble"></div>
        <div id="trainer-preview" class="trainer-preview"></div>
        <div id="trainer-timer" class="trainer-timer color-idle">0.000</div>
        <div id="trainer-hint" class="trainer-hint">长按空格 2 秒准备计时</div>
        <div id="trainer-result" class="trainer-result"></div>

        <div id="trainer-input-area" class="trainer-input-area">
          <input
            id="trainer-input"
            class="trainer-input"
            type="text"
            autocomplete="off"
            placeholder="输入记忆码"
          />
        </div>

        <div class="trainer-config">
          <label class="inline" for="show-scramble-preview">
            <input id="show-scramble-preview" type="checkbox" />
            显示打乱后状态
          </label>
          <span class="trainer-config-sep">|</span>
          <label for="confirm-key-select">确认键：</label>
          <select id="confirm-key-select">
            <option value="Enter">Enter</option>
            <option value="Space">Space</option>
          </select>
        </div>

        <div id="trainer-stats" class="trainer-stats"></div>

        <div class="trainer-results-header">
          <h3>成绩记录</h3>
          <button id="clear-results" class="btn-danger" type="button">清空全部</button>
        </div>

        <ul id="trainer-results-list" class="trainer-results-list"></ul>

      </div><!-- /mode-trainer -->

    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
