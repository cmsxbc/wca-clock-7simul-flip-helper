<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock 7simul Flip 学习助手</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 16px;
        color: #cbd5e1;
      }

      form {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      input[type="number"] {
        width: 100px;
        padding: 8px 10px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
      }

      textarea {
        width: 100%;
        min-height: 76px;
        padding: 10px 12px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        font-weight: 600;
        cursor: pointer;
        background: #38bdf8;
        color: #0f172a;
      }

      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .secondary {
        background: #334155;
        color: #e2e8f0;
      }

      .status {
        margin: 6px 0 16px;
        color: #94a3b8;
      }

      .panel {
        border: 1px solid #334155;
        border-radius: 10px;
        background: #0b1222;
        padding: 12px;
        margin: 0 0 14px;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .inline input[type="checkbox"] {
        transform: translateY(1px);
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .scramble-item {
        padding: 10px 12px;
        border-radius: 8px;
        background: #1e293b;
        border: 1px solid #334155;
      }

      .scramble-text {
        margin: 0 0 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .scramble-preview {
        background: #0b1222;
        border-radius: 8px;
        border: 1px solid #334155;
        padding: 4px;
      }

      .memo-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 8px;
      }

      .strict-restore-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 8px;
      }

      .strict-restore-title {
        margin: 0 0 6px;
        font-weight: 700;
      }

      .strict-step {
        margin-top: 8px;
      }

      .strict-step-title {
        margin: 0 0 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .memo-summary {
        margin: 0;
        font-weight: 700;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .memo-details {
        margin-top: 6px;
      }

      .memo-details summary {
        cursor: pointer;
        color: #93c5fd;
      }

      .memo-table-wrap {
        margin-top: 8px;
        overflow-x: auto;
      }

      .memo-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
        font-size: 0.92rem;
      }

      .memo-table th,
      .memo-table td {
        border: 1px solid #334155;
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }

      .memo-table th {
        background: #162038;
        color: #bfdbfe;
        font-weight: 700;
      }

      .memo-table td:nth-child(1),
      .memo-table td:nth-child(5) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
      }

      .memo-table td:nth-child(2),
      .memo-table td:nth-child(4) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .meta {
        margin-top: 22px;
        color: #94a3b8;
        font-size: 0.92rem;
      }

      code {
        background: #1e293b;
        padding: 1px 4px;
        border-radius: 4px;
      }

      /* Collapsible panel */
      .collapsible-panel {
        cursor: default;
      }

      .collapsible-panel summary {
        cursor: pointer;
        color: #93c5fd;
        font-weight: 600;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .collapsible-panel summary::-webkit-details-marker {
        display: none;
      }

      .collapsible-panel summary::before {
        content: "▶";
        font-size: 0.7em;
        transition: transform 0.15s;
      }

      .collapsible-panel[open] summary::before {
        transform: rotate(90deg);
      }

      .custom-form-inner {
        margin-top: 10px;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 10px;
        line-height: 0;
      }

      kbd {
        background: #334155;
        border: 1px solid #475569;
        border-radius: 4px;
        padding: 1px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.82rem;
        color: #cbd5e1;
      }

      button kbd {
        background: rgba(0, 0, 0, 0.2);
        border-color: rgba(0, 0, 0, 0.15);
        color: inherit;
      }

      /* History list */
      .history-list {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
        display: grid;
        gap: 4px;
        max-height: 300px;
        overflow-y: auto;
      }

      .history-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .history-item:hover {
        border-color: #475569;
      }

      .history-scramble {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }

      .history-date {
        color: #64748b;
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      /* Mode tab bar */
      .tab-bar {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-bottom: 2px solid #334155;
      }

      .tab-btn {
        background: transparent;
        color: #94a3b8;
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 0;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn:hover {
        color: #e2e8f0;
      }

      .tab-btn.active {
        color: #38bdf8;
        border-bottom-color: #38bdf8;
      }

      .mode-container {
        display: none;
      }

      .mode-container.visible {
        display: block;
      }

      /* Memo trainer */
      .trainer-scramble {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        color: #e2e8f0;
        padding: 16px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        margin-bottom: 20px;
        word-break: break-word;
      }

      .trainer-touch-zone {
        border: 2px dashed #334155;
        border-radius: 12px;
        padding: 8px 16px;
        margin-bottom: 8px;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        transition: border-color 0.15s;
      }

      .trainer-touch-zone.zone-holding {
        border-color: #f87171;
      }

      .trainer-touch-zone.zone-ready {
        border-color: #4ade80;
      }

      .trainer-timer {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 4rem;
        font-weight: 700;
        margin: 16px 0;
        transition: color 0.15s;
        user-select: none;
      }

      .trainer-timer.color-idle { color: #e2e8f0; }
      .trainer-timer.color-holding { color: #f87171; }
      .trainer-timer.color-ready { color: #4ade80; }
      .trainer-timer.color-running { color: #38bdf8; }
      .trainer-timer.color-dnf { color: #f87171; }
      .trainer-timer.color-valid { color: #4ade80; }

      .trainer-hint {
        text-align: center;
        color: #94a3b8;
        margin-bottom: 16px;
        min-height: 1.5em;
      }

      .trainer-input-area {
        display: none;
        text-align: center;
        margin-bottom: 20px;
      }

      .trainer-input-area.visible {
        display: block;
      }

      .trainer-input {
        width: 240px;
        max-width: 80%;
        padding: 10px 14px;
        border: 2px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
        font-size: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        text-align: center;
        letter-spacing: 0.15em;
      }

      .trainer-input:focus {
        outline: none;
        border-color: #38bdf8;
      }

      .trainer-result {
        text-align: center;
        margin-bottom: 16px;
        min-height: 1.5em;
        font-weight: 600;
      }

      /* Virtual keypad */
      .virtual-keypad {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        user-select: none;
        -webkit-user-select: none;
      }

      .keypad-row {
        display: flex;
        gap: 6px;
        justify-content: center;
      }

      .keypad-key {
        min-width: 44px;
        min-height: 44px;
        padding: 8px 12px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1e293b;
        color: #f8fafc;
        font-size: 1.1rem;
        font-weight: 600;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .keypad-key:active {
        background: #334155;
      }

      .keypad-del {
        background: #7f1d1d;
        color: #fca5a5;
        border-color: #7f1d1d;
        font-size: 0.85rem;
      }

      .keypad-del:active {
        background: #991b1b;
      }

      .keypad-submit {
        min-width: 120px;
        background: #38bdf8;
        color: #0f172a;
        border-color: #38bdf8;
      }

      .keypad-submit:active {
        background: #0ea5e9;
      }

      .keypad-row-submit {
        margin-top: 4px;
      }

      .trainer-preview {
        margin-bottom: 16px;
        border-radius: 10px;
        overflow: hidden;
      }

      .trainer-preview:empty {
        display: none;
      }

      .trainer-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }

      .stat-label {
        font-size: 0.78rem;
        color: #94a3b8;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .stat-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: #e2e8f0;
      }

      .trainer-results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .trainer-results-header h3 {
        margin: 0;
        font-size: 1rem;
      }

      .trainer-results-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 6px;
        max-height: 400px;
        overflow-y: auto;
      }

      .result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        font-size: 0.92rem;
        cursor: pointer;
      }

      .result-item:hover {
        border-color: #475569;
      }

      .result-index {
        color: #64748b;
        min-width: 2.5em;
        text-align: right;
      }

      .result-time {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-weight: 600;
        min-width: 6em;
      }

      .result-time.dnf {
        color: #f87171;
      }

      .result-date {
        color: #64748b;
        margin-left: auto;
        font-size: 0.82rem;
      }

      .result-detail {
        display: none;
        margin-top: 6px;
        padding: 8px 10px;
        background: #0b1222;
        border: 1px solid #334155;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #cbd5e1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        word-break: break-word;
      }

      .result-detail.visible {
        display: block;
      }

      .result-detail p {
        margin: 2px 0;
        color: #cbd5e1;
      }

      .btn-danger {
        background: #7f1d1d;
        color: #fca5a5;
        font-size: 0.82rem;
        padding: 5px 10px;
      }

      .btn-danger:hover {
        background: #991b1b;
      }

      /* Back to top */
      .back-to-top {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #1e293b;
        border: 1px solid #475569;
        color: #94a3b8;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, color 0.15s, border-color 0.15s;
        z-index: 50;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .back-to-top.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .back-to-top:hover {
        color: #e2e8f0;
        border-color: #64748b;
      }

      /* Settings panel */
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .header-row h1 {
        margin: 0;
        min-width: 0;
      }

      @media (max-width: 480px) {
        .header-row h1 {
          font-size: 1.25rem;
        }
      }

      .settings-btn {
        background: transparent;
        border: 1px solid #475569;
        border-radius: 8px;
        padding: 6px;
        color: #94a3b8;
        cursor: pointer;
        line-height: 0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s, border-color 0.15s;
      }

      .settings-btn:hover {
        color: #e2e8f0;
        border-color: #64748b;
      }

      .settings-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
      }

      .settings-overlay.open {
        display: block;
      }

      .settings-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(320px, 85vw);
        background: #0f172a;
        border-left: 1px solid #334155;
        padding: 20px 16px;
        overflow-y: auto;
        z-index: 101;
        transform: translateX(100%);
        transition: transform 0.2s ease;
      }

      .settings-overlay.open .settings-panel {
        transform: translateX(0);
      }

      .settings-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .settings-header h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .settings-close {
        background: transparent;
        border: 0;
        color: #94a3b8;
        font-size: 1.4rem;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
        border-radius: 6px;
      }

      .settings-close:hover {
        color: #e2e8f0;
      }

      .settings-section {
        margin-bottom: 20px;
      }

      .settings-section-title {
        font-size: 0.82rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid #1e293b;
      }

      .settings-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        color: #cbd5e1;
        font-size: 0.92rem;
      }

      .settings-item select {
        padding: 4px 8px;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.9rem;
      }

      /* ── Responsive: Tablet (768px+) ── */

      @media (min-width: 768px) {
        .container {
          max-width: 100%;
          padding: 28px 40px 48px;
        }

        .trainer-stats {
          grid-template-columns: repeat(6, 1fr);
        }

        .trainer-timer {
          font-size: 5rem;
        }
      }

      /* ── Responsive: Desktop (1024px+) ── */

      @media (min-width: 1024px) {
        .container {
          max-width: 1440px;
          padding: 32px 48px 48px;
        }

        /* Learn: body with history sidebar */

        .learn-body {
          display: grid;
          grid-template-columns: 1fr 300px;
          gap: 24px;
          align-items: start;
        }

        .learn-aside {
          position: sticky;
          top: 24px;
          margin-bottom: 0;
        }

        .learn-aside .history-list {
          max-height: 70vh;
        }

        /* Learn: scramble items keep stacked layout so preview SVG stays full-width */

        /* Learn: strict restore steps in multi-column grid */

        .strict-restore-block {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 8px 16px;
        }

        .strict-restore-block > .strict-restore-title,
        .strict-restore-block > .status,
        .strict-restore-block > .memo-table-wrap {
          grid-column: 1 / -1;
        }

        /* Trainer: 2-column layout */

        .trainer-layout {
          display: grid;
          grid-template-columns: 1fr 360px;
          gap: 32px;
          align-items: start;
        }

        .trainer-sidebar {
          position: sticky;
          top: 24px;
          border-left: 1px solid #334155;
          padding-left: 32px;
        }

        .trainer-sidebar .trainer-stats {
          grid-template-columns: repeat(3, 1fr);
        }

        .trainer-sidebar .trainer-results-list {
          max-height: 60vh;
        }

        .trainer-scramble {
          font-size: 1.2rem;
        }

        .trainer-timer {
          font-size: 5.5rem;
        }

        h1 {
          font-size: 2rem;
        }

        
      }

      /* ── Responsive: Wide desktop (1400px+) ── */

      @media (min-width: 1400px) {
        .container {
          max-width: 1600px;
        }

        .trainer-layout {
          grid-template-columns: 1fr 440px;
        }

        .learn-body {
          grid-template-columns: 1fr 360px;
        }

        .strict-restore-block {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="settings-overlay" class="settings-overlay">
      <aside class="settings-panel">
        <div class="settings-header">
          <h2>设置</h2>
          <button id="settings-close" class="settings-close" type="button">✕</button>
        </div>

        <div class="settings-section">
          <p class="settings-section-title">学习模式</p>
          <label class="settings-item" for="reset-pins">
            <input id="reset-pins" type="checkbox" checked />
            结束时将 pins 全部按下
          </label>
          <label class="settings-item" for="show-strict-restore">
            <input id="show-strict-restore" type="checkbox" />
            显示 7simul flip 执行过程
          </label>
          <label class="settings-item" for="show-memo-derivation">
            <input id="show-memo-derivation" type="checkbox" />
            显示记忆编码推导
          </label>
          <label class="settings-item" for="show-strict-details">
            <input id="show-strict-details" type="checkbox" checked />
            显示每一步状态图
          </label>
          <label class="settings-item" for="show-ghost-hands">
            <input id="show-ghost-hands" type="checkbox" />
            显示橙色虚线（上一步指针）
          </label>
        </div>

        <div class="settings-section">
          <p class="settings-section-title">记忆练习</p>
          <label class="settings-item" for="show-scramble-preview">
            <input id="show-scramble-preview" type="checkbox" />
            显示打乱后状态
          </label>
          <div class="settings-item">
            <label for="confirm-key-select">确认键：</label>
            <select id="confirm-key-select">
              <option value="Enter">Enter</option>
              <option value="Space">Space</option>
            </select>
          </div>
        </div>
      </aside>
    </div>

    <main class="container">
      <div class="header-row">
        <h1>Clock 7simul Flip 学习助手</h1>
        <button id="settings-btn" class="settings-btn" type="button" title="设置"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/><line x1="15" y1="12" x2="20" y2="12"/><line x1="4" y1="12" x2="9" y2="12"/><line x1="15" y1="5" x2="20" y2="5"/><line x1="4" y1="5" x2="9" y2="5"/><line x1="15" y1="19" x2="20" y2="19"/><line x1="4" y1="19" x2="9" y2="19"/></svg></button>
      </div>

      <nav class="tab-bar">
        <button class="tab-btn" data-mode="trainer">记忆练习</button>
        <button class="tab-btn active" data-mode="learn">学习模式</button>
        <button class="tab-btn" data-mode="generator">打乱生成</button>
      </nav>

      <div id="mode-learn" class="mode-container visible">

      <details id="custom-panel" class="panel collapsible-panel">
        <summary class="panel-toggle">
          输入自定义打乱
          <button id="learn-generate" type="button" style="margin-left:auto;" title="生成练习打乱（快捷键 →）">生成打乱 <kbd>→</kbd></button>
        </summary>
        <form id="custom-form" class="custom-form-inner">
          <textarea
            id="custom-scramble"
            name="custom-scramble"
            placeholder="例如：UR1- DR2+ DL0+ UL5- U3+ R2- D1+ L0+ ALL4- y2 U1+ R4- D2+ L3- ALL0+"
          ></textarea>
          <div class="inline">
            <button type="submit">渲染此打乱</button>
          </div>
        </form>
      </details>

      <div id="status" class="status"></div>

      <div class="learn-body">
        <ol id="output-list" class="list"></ol>

        <details id="history-panel" class="panel collapsible-panel learn-aside">
          <summary class="panel-toggle">
            历史记录
            <button id="clear-history" class="btn-danger" type="button" style="margin-left:auto;">清空历史</button>
          </summary>
          <ul id="history-list" class="history-list"></ul>
        </details>
      </div>

      </div><!-- /mode-learn -->

      <div id="mode-generator" class="mode-container">
        <form id="gen-form">
          <label for="gen-count">生成条数：</label>
          <input id="gen-count" name="gen-count" type="number" min="1" max="200" value="5" />
          <button type="submit">生成</button>
          <button id="gen-copy-all" type="button" class="secondary icon-btn" disabled title="复制全部"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </form>
        <div id="gen-status" class="status"></div>
        <ol id="gen-output-list" class="list"></ol>
      </div><!-- /mode-generator -->

      <div id="mode-trainer" class="mode-container">

        <div id="trainer-scramble" class="trainer-scramble"></div>

        <div class="trainer-layout">
          <div class="trainer-main">
            <div id="trainer-preview" class="trainer-preview"></div>
            <div id="trainer-touch-zone" class="trainer-touch-zone">
              <div id="trainer-timer" class="trainer-timer color-idle">0.000</div>
              <div id="trainer-hint" class="trainer-hint">长按空格或触屏 1 秒准备计时</div>
            </div>
            <div id="trainer-result" class="trainer-result"></div>

            <div id="trainer-input-area" class="trainer-input-area">
              <input
                id="trainer-input"
                class="trainer-input"
                type="text"
                autocomplete="off"
                inputmode="none"
                placeholder="输入记忆码"
              />
              <div id="virtual-keypad" class="virtual-keypad">
                <div class="keypad-row">
                  <button type="button" class="keypad-key" data-key="1">1</button>
                  <button type="button" class="keypad-key" data-key="2">2</button>
                  <button type="button" class="keypad-key" data-key="3">3</button>
                  <button type="button" class="keypad-key" data-key="4">4</button>
                  <button type="button" class="keypad-key" data-key="5">5</button>
                  <button type="button" class="keypad-key" data-key="6">6</button>
                </div>
                <div class="keypad-row">
                  <button type="button" class="keypad-key" data-key="A">A</button>
                  <button type="button" class="keypad-key" data-key="B">B</button>
                  <button type="button" class="keypad-key" data-key="C">C</button>
                  <button type="button" class="keypad-key" data-key="D">D</button>
                  <button type="button" class="keypad-key" data-key="E">E</button>
                  <button type="button" class="keypad-key keypad-del" data-key="DEL">DEL</button>
                </div>
                <div class="keypad-row keypad-row-submit">
                  <button type="button" id="keypad-submit" class="keypad-key keypad-submit">提交</button>
                </div>
              </div>
            </div>
          </div>

          <div class="trainer-sidebar">
            <div id="trainer-stats" class="trainer-stats"></div>

            <div class="trainer-results-header">
              <h3>成绩记录</h3>
              <button id="clear-results" class="btn-danger" type="button">清空全部</button>
            </div>

            <ul id="trainer-results-list" class="trainer-results-list"></ul>
          </div>
        </div>

      </div><!-- /mode-trainer -->

    </main>

    <button id="back-to-top" class="back-to-top" type="button" title="回到顶部">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script type="module" src="./app.js"></script>
  </body>
</html>
