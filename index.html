<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Clock 7simul Flip 学习助手</title>
    <link id="link-manifest" rel="manifest" href="./manifest.json" />
    <link id="link-icon-svg" rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link id="link-icon-png" rel="icon" href="./icon-192.png" type="image/png" sizes="192x192" />
    <link id="link-apple-touch" rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <script>
      (function () {
        var t = localStorage.getItem("clock.ui.theme") || "dark";
        if (t === "system") t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <style>
      :root,
      [data-theme="dark"] {
        color-scheme: dark;
        --bg-page: #0f172a;
        --bg-surface: #1e293b;
        --bg-deep: #0b1222;
        --bg-muted: #334155;
        --border-primary: #334155;
        --border-secondary: #475569;
        --text-primary: #e2e8f0;
        --text-secondary: #cbd5e1;
        --text-on-surface: #f8fafc;
        --text-muted: #94a3b8;
        --text-dimmed: #64748b;
        --accent: #38bdf8;
        --accent-contrast: #0f172a;
        --accent-hover: #0ea5e9;
        --link: #93c5fd;
        --table-header-bg: #162038;
        --table-header-text: #bfdbfe;
        --danger-bg: #7f1d1d;
        --danger-text: #fca5a5;
        --danger-hover: #991b1b;
        --shadow: rgba(0, 0, 0, 0.3);
        --overlay-bg: rgba(0, 0, 0, 0.5);
      }

      [data-theme="light"] {
        color-scheme: light;
        --bg-page: #f8fafc;
        --bg-surface: #ffffff;
        --bg-deep: #f1f5f9;
        --bg-muted: #e2e8f0;
        --border-primary: #cbd5e1;
        --border-secondary: #94a3b8;
        --text-primary: #1e293b;
        --text-secondary: #475569;
        --text-on-surface: #0f172a;
        --text-muted: #64748b;
        --text-dimmed: #94a3b8;
        --accent: #0284c7;
        --accent-contrast: #ffffff;
        --accent-hover: #0369a1;
        --link: #2563eb;
        --table-header-bg: #dbeafe;
        --table-header-text: #1e40af;
        --danger-bg: #fee2e2;
        --danger-text: #991b1b;
        --danger-hover: #fecaca;
        --shadow: rgba(0, 0, 0, 0.08);
        --overlay-bg: rgba(0, 0, 0, 0.3);
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 16px;
        color: var(--text-secondary);
      }

      form {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      input[type="number"] {
        width: 100px;
        padding: 8px 10px;
        border: 1px solid var(--border-secondary);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-on-surface);
      }

      textarea {
        width: 100%;
        min-height: 76px;
        padding: 10px 12px;
        border: 1px solid var(--border-secondary);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-on-surface);
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: var(--accent-contrast);
      }

      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .secondary {
        background: var(--bg-muted);
        color: var(--text-primary);
      }

      .status {
        margin: 6px 0 16px;
        color: var(--text-muted);
      }

      .panel {
        border: 1px solid var(--border-primary);
        border-radius: 10px;
        background: var(--bg-deep);
        padding: 12px;
        margin: 0 0 14px;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .inline input[type="checkbox"] {
        transform: translateY(1px);
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .scramble-item {
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
      }

      .scramble-text {
        margin: 0 0 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .scramble-preview {
        background: var(--bg-deep);
        border-radius: 8px;
        border: 1px solid var(--border-primary);
        padding: 4px;
        cursor: zoom-in;
      }

      .diagram-lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        z-index: 200;
        cursor: zoom-out;
        padding: 24px;
        box-sizing: border-box;
      }

      .diagram-lightbox.open {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .diagram-lightbox-content {
        width: min(calc(100vw - 48px), 928px);
        max-height: 90vh;
        background: var(--bg-deep);
        border-radius: 12px;
        border: 1px solid var(--border-primary);
        padding: 4px;
        box-sizing: border-box;
        box-shadow: 0 8px 32px var(--shadow);
        cursor: default;
      }

      .diagram-lightbox-content svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .memo-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: var(--bg-deep);
        border: 1px solid var(--border-primary);
        border-radius: 8px;
      }

      .strict-restore-block {
        margin-top: 8px;
        padding: 8px 10px;
        background: var(--bg-deep);
        border: 1px solid var(--border-primary);
        border-radius: 8px;
      }

      .strict-restore-title {
        margin: 0 0 6px;
        font-weight: 700;
      }

      .strict-verbose-details {
        margin: 4px 0 4px;
      }

      .strict-verbose-details summary {
        cursor: pointer;
        color: var(--link);
        font-size: 0.85rem;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .strict-verbose-details summary::-webkit-details-marker {
        display: none;
      }

      .strict-verbose-details summary::before {
        content: "▶";
        font-size: 0.65em;
        transition: transform 0.15s;
      }

      .strict-verbose-details[open] summary::before {
        transform: rotate(90deg);
      }

      .strict-verbose-table {
        min-width: 480px;
      }

      .text-center {
        text-align: center;
      }

      .strict-step {
        margin-top: 8px;
      }

      .strict-step-title {
        margin: 0 0 2px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .strict-step-ops {
        margin: 0 0 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.88rem;
        color: var(--text-muted);
      }

      .memo-summary {
        margin: 0;
        font-weight: 700;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .memo-concealed {
        cursor: pointer;
      }

      .memo-concealed .memo-summary,
      .memo-concealed .memo-table-wrap {
        filter: blur(8px);
        user-select: none;
        pointer-events: none;
        transition: filter 0.2s;
      }

      .memo-reveal-hint {
        margin: 6px 0 0;
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
      }

      .memo-block:not(.memo-concealed) .memo-reveal-hint {
        display: none;
      }

      .memo-details {
        margin-top: 6px;
      }

      .memo-details summary {
        cursor: pointer;
        color: var(--link);
      }

      .memo-table-wrap {
        margin-top: 8px;
        overflow-x: auto;
      }

      .memo-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
        font-size: 0.92rem;
      }

      .memo-table th,
      .memo-table td {
        border: 1px solid var(--border-primary);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }

      .memo-table th {
        background: var(--table-header-bg);
        color: var(--table-header-text);
        font-weight: 700;
      }

      .memo-table td:nth-child(1),
      .memo-table td:nth-child(5) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
      }

      .memo-table td:nth-child(2),
      .memo-table td:nth-child(4) {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .meta {
        margin-top: 22px;
        color: var(--text-muted);
        font-size: 0.92rem;
      }

      code {
        background: var(--bg-surface);
        padding: 1px 4px;
        border-radius: 4px;
      }

      /* Collapsible panel */
      .collapsible-panel {
        cursor: default;
      }

      .collapsible-panel summary {
        cursor: pointer;
        color: var(--link);
        font-weight: 600;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .collapsible-panel summary::-webkit-details-marker {
        display: none;
      }

      .collapsible-panel summary::before {
        content: "▶";
        font-size: 0.7em;
        transition: transform 0.15s;
      }

      .collapsible-panel[open] summary::before {
        transform: rotate(90deg);
      }

      .custom-form-inner {
        margin-top: 10px;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 10px;
        line-height: 0;
      }

      kbd {
        background: var(--bg-muted);
        border: 1px solid var(--border-secondary);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.82rem;
        color: var(--text-secondary);
      }

      button kbd {
        background: rgba(0, 0, 0, 0.2);
        border-color: rgba(0, 0, 0, 0.15);
        color: inherit;
      }

      /* History list */
      .history-list {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
        display: grid;
        gap: 4px;
        max-height: 300px;
        overflow-y: auto;
      }

      .history-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .history-item:hover {
        border-color: var(--border-secondary);
      }

      .history-scramble {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }

      .history-date {
        color: var(--text-dimmed);
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      /* Mode tab bar */
      .tab-bar {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border-primary);
      }

      .tab-btn {
        background: transparent;
        color: var(--text-muted);
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 0;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn:hover {
        color: var(--text-primary);
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .mode-container {
        display: none;
      }

      .mode-container.visible {
        display: block;
      }

      /* Memo trainer */
      .trainer-scramble {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        color: var(--text-primary);
        padding: 16px 12px;
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
        border-radius: 10px;
        margin-bottom: 20px;
        word-break: break-word;
      }

      .trainer-touch-zone {
        border: 2px dashed var(--border-primary);
        border-radius: 12px;
        padding: 8px 16px;
        margin-bottom: 8px;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        transition: border-color 0.15s;
      }

      .trainer-touch-zone.zone-holding {
        border-color: #f87171;
      }

      .trainer-touch-zone.zone-ready {
        border-color: #4ade80;
      }

      .trainer-timer {
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 4rem;
        font-weight: 700;
        margin: 16px 0;
        transition: color 0.15s;
        user-select: none;
      }

      .trainer-timer.color-idle { color: var(--text-primary); }
      .trainer-timer.color-holding { color: #f87171; }
      .trainer-timer.color-ready { color: #4ade80; }
      .trainer-timer.color-running { color: var(--accent); }
      .trainer-timer.color-dnf { color: #f87171; }
      .trainer-timer.color-valid { color: #4ade80; }

      .trainer-hint {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 16px;
        min-height: 1.5em;
      }

      .trainer-input-area {
        display: none;
        text-align: center;
        margin-bottom: 20px;
      }

      .trainer-input-area.visible {
        display: block;
      }

      .trainer-input {
        width: 240px;
        max-width: 80%;
        padding: 10px 14px;
        border: 2px solid var(--border-secondary);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-on-surface);
        font-size: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        text-align: center;
        letter-spacing: 0.15em;
      }

      .trainer-input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .trainer-result {
        text-align: center;
        margin-bottom: 16px;
        min-height: 1.5em;
        font-weight: 600;
      }

      /* Virtual keypad */
      .virtual-keypad {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        user-select: none;
        -webkit-user-select: none;
      }

      .keypad-row {
        display: flex;
        gap: 6px;
        justify-content: center;
      }

      .keypad-key {
        min-width: 44px;
        min-height: 44px;
        padding: 8px 12px;
        border: 1px solid var(--border-secondary);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-on-surface);
        font-size: 1.1rem;
        font-weight: 600;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .keypad-key:active {
        background: var(--bg-muted);
      }

      .keypad-del {
        background: var(--danger-bg);
        color: var(--danger-text);
        border-color: var(--danger-bg);
        font-size: 0.85rem;
      }

      .keypad-del:active {
        background: var(--danger-hover);
      }

      .keypad-submit {
        min-width: 120px;
        background: var(--accent);
        color: var(--accent-contrast);
        border-color: var(--accent);
      }

      .keypad-submit:active {
        background: var(--accent-hover);
      }

      .keypad-row-submit {
        margin-top: 4px;
      }

      .trainer-preview {
        margin-bottom: 16px;
        border-radius: 10px;
        overflow: hidden;
        cursor: zoom-in;
      }

      .trainer-preview:empty {
        display: none;
      }

      .trainer-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }

      .stat-label {
        font-size: 0.78rem;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .stat-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      .trainer-results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .trainer-results-header h3 {
        margin: 0;
        font-size: 1rem;
      }

      .trainer-results-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 6px;
        max-height: 400px;
        overflow-y: auto;
      }

      .result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: var(--bg-surface);
        border: 1px solid var(--border-primary);
        border-radius: 8px;
        font-size: 0.92rem;
        cursor: pointer;
      }

      .result-item:hover {
        border-color: var(--border-secondary);
      }

      .result-index {
        color: var(--text-dimmed);
        min-width: 2.5em;
        text-align: right;
      }

      .result-time {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-weight: 600;
        min-width: 6em;
      }

      .result-time.dnf {
        color: #f87171;
      }

      .result-date {
        color: var(--text-dimmed);
        margin-left: auto;
        font-size: 0.82rem;
      }

      .result-detail {
        display: none;
        margin-top: 6px;
        padding: 8px 10px;
        background: var(--bg-deep);
        border: 1px solid var(--border-primary);
        border-radius: 6px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        word-break: break-word;
      }

      .result-detail.visible {
        display: block;
      }

      .result-detail p {
        margin: 2px 0;
        color: var(--text-secondary);
      }

      .btn-danger {
        background: var(--danger-bg);
        color: var(--danger-text);
        font-size: 0.82rem;
        padding: 5px 10px;
      }

      .btn-danger:hover {
        background: var(--danger-hover);
      }

      /* Back to top */
      .back-to-top {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--bg-surface);
        border: 1px solid var(--border-secondary);
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, color 0.15s, border-color 0.15s;
        z-index: 50;
        box-shadow: 0 2px 8px var(--shadow);
      }

      .back-to-top.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .back-to-top:hover {
        color: var(--text-primary);
        border-color: var(--text-dimmed);
      }

      /* Settings panel */
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .header-row h1 {
        margin: 0;
        min-width: 0;
      }

      @media (max-width: 480px) {
        .header-row h1 {
          font-size: 1.25rem;
        }
      }

      .settings-btn {
        background: transparent;
        border: 1px solid var(--border-secondary);
        border-radius: 8px;
        padding: 6px;
        color: var(--text-muted);
        cursor: pointer;
        line-height: 0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s, border-color 0.15s;
      }

      .settings-btn:hover {
        color: var(--text-primary);
        border-color: var(--text-dimmed);
      }

      .settings-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        z-index: 100;
      }

      .settings-overlay.open {
        display: block;
      }

      .settings-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(360px, 85vw);
        background: var(--bg-page);
        border-left: 1px solid var(--border-primary);
        padding: 20px 16px;
        overflow-y: auto;
        z-index: 101;
        transform: translateX(100%);
        transition: transform 0.2s ease;
      }

      .settings-overlay.open .settings-panel {
        transform: translateX(0);
      }

      .settings-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .settings-header h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .settings-close {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        font-size: 1.4rem;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
        border-radius: 6px;
      }

      .settings-close:hover {
        color: var(--text-primary);
      }

      .settings-section {
        margin-bottom: 20px;
      }

      .settings-section-title {
        font-size: 0.82rem;
        color: var(--text-dimmed);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--bg-surface);
      }

      .settings-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        color: var(--text-secondary);
        font-size: 0.92rem;
      }

      .settings-item select {
        padding: 4px 8px;
        border: 1px solid var(--border-secondary);
        border-radius: 6px;
        background: var(--bg-surface);
        color: var(--text-on-surface);
        font-size: 0.9rem;
      }

      /* Color picker grid */
      .color-group-label {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-muted);
        margin: 8px 0 4px;
      }

      .color-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 12px;
      }

      .color-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
        font-size: 0.82rem;
        color: var(--text-secondary);
      }

      .color-item input[type="color"] {
        -webkit-appearance: none;
        appearance: none;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border-secondary);
        border-radius: 6px;
        background: none;
        cursor: pointer;
        padding: 2px;
        flex-shrink: 0;
      }

      .color-item input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      .color-item input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 4px;
      }

      .color-item input[type="color"]::-moz-color-swatch {
        border: none;
        border-radius: 4px;
      }

      .color-reset-row {
        margin-top: 8px;
      }

      .color-reset-row button {
        font-size: 0.82rem;
        padding: 4px 10px;
      }

      /* ── Responsive: Tablet (768px+) ── */

      @media (min-width: 768px) {
        .container {
          max-width: 100%;
          padding: 28px 40px 48px;
        }

        .trainer-stats {
          grid-template-columns: repeat(6, 1fr);
        }

        .trainer-timer {
          font-size: 5rem;
        }
      }

      /* ── Responsive: Desktop (1024px+) ── */

      @media (min-width: 1024px) {
        .container {
          max-width: 1440px;
          padding: 32px 48px 48px;
        }

        .learn-body {
          display: grid;
          grid-template-columns: 1fr 300px;
          gap: 24px;
          align-items: start;
        }

        .learn-aside {
          position: sticky;
          top: 24px;
          margin-bottom: 0;
        }

        .learn-aside .history-list {
          max-height: 70vh;
        }

        .strict-restore-block {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 8px 16px;
        }

        .strict-restore-block > .strict-restore-title,
        .strict-restore-block > .status,
        .strict-restore-block > .strict-verbose-details,
        .strict-restore-block > .memo-table-wrap {
          grid-column: 1 / -1;
        }

        .trainer-layout {
          display: grid;
          grid-template-columns: 1fr 360px;
          gap: 32px;
          align-items: start;
        }

        .trainer-sidebar {
          position: sticky;
          top: 24px;
          border-left: 1px solid var(--border-primary);
          padding-left: 32px;
        }

        .trainer-sidebar .trainer-stats {
          grid-template-columns: repeat(3, 1fr);
        }

        .trainer-sidebar .trainer-results-list {
          max-height: 60vh;
        }

        .trainer-scramble {
          font-size: 1.2rem;
        }

        .trainer-timer {
          font-size: 5.5rem;
        }

        h1 {
          font-size: 2rem;
        }
      }

      /* ── Responsive: Wide desktop (1400px+) ── */

      @media (min-width: 1400px) {
        .container {
          max-width: 1600px;
        }

        .trainer-layout {
          grid-template-columns: 1fr 440px;
        }

        .learn-body {
          grid-template-columns: 1fr 360px;
        }

        .strict-restore-block {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="diagram-lightbox" class="diagram-lightbox">
      <div class="diagram-lightbox-content" id="diagram-lightbox-content"></div>
    </div>
    <div id="settings-overlay" class="settings-overlay">
      <aside class="settings-panel">
        <div class="settings-header">
          <h2 data-i18n="settings.title">设置</h2>
          <button id="settings-close" class="settings-close" type="button">✕</button>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.language">语言</p>
          <div class="settings-item">
            <label for="lang-select" data-i18n="settings.language.label">界面语言：</label>
            <select id="lang-select">
              <option value="zh-CN">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.appearance">外观</p>
          <div class="settings-item">
            <label for="theme-select" data-i18n="settings.theme.label">主题模式：</label>
            <select id="theme-select">
              <option value="dark" data-i18n="settings.theme.dark">夜间（深色）</option>
              <option value="light" data-i18n="settings.theme.light">日间（浅色）</option>
              <option value="system" data-i18n="settings.theme.system">跟随系统</option>
            </select>
          </div>
          <div class="settings-item">
            <label for="icon-theme-select" data-i18n="settings.iconTheme.label">桌面图标：</label>
            <select id="icon-theme-select">
              <option value="dark" data-i18n="settings.iconTheme.dark">深色</option>
              <option value="light" data-i18n="settings.iconTheme.light">浅色</option>
            </select>
          </div>
          <div id="icon-preview" class="settings-item" style="gap:12px;">
            <img id="icon-preview-dark" src="./icon-192.png" width="48" height="48" style="border-radius:10px;border:2px solid var(--border-primary);cursor:pointer;" />
            <img id="icon-preview-light" src="./icon-light-192.png" width="48" height="48" style="border-radius:10px;border:2px solid var(--border-primary);cursor:pointer;" />
          </div>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.clockColors">Clock 配色</p>
          <p class="color-group-label" data-i18n="settings.clockColors.front">正面（深色面）</p>
          <div class="color-grid">
            <label class="color-item"><input type="color" id="color-front-face" /> <span data-i18n="settings.clockColors.face">大表盘</span></label>
            <label class="color-item"><input type="color" id="color-front-dial" /> <span data-i18n="settings.clockColors.dial">小表盘</span></label>
            <label class="color-item"><input type="color" id="color-front-hand" /> <span data-i18n="settings.clockColors.hand">指针</span></label>
            <label class="color-item"><input type="color" id="color-front-pin-up" /> <span data-i18n="settings.clockColors.pinUp">Pin ↑</span></label>
            <label class="color-item"><input type="color" id="color-front-pin-down" /> <span data-i18n="settings.clockColors.pinDown">Pin ↓</span></label>
          </div>
          <p class="color-group-label" data-i18n="settings.clockColors.back">背面（浅色面）</p>
          <div class="color-grid">
            <label class="color-item"><input type="color" id="color-back-face" /> <span data-i18n="settings.clockColors.face">大表盘</span></label>
            <label class="color-item"><input type="color" id="color-back-dial" /> <span data-i18n="settings.clockColors.dial">小表盘</span></label>
            <label class="color-item"><input type="color" id="color-back-hand" /> <span data-i18n="settings.clockColors.hand">指针</span></label>
            <label class="color-item"><input type="color" id="color-back-pin-up" /> <span data-i18n="settings.clockColors.pinUp">Pin ↑</span></label>
            <label class="color-item"><input type="color" id="color-back-pin-down" /> <span data-i18n="settings.clockColors.pinDown">Pin ↓</span></label>
          </div>
          <div class="color-reset-row">
            <button id="reset-clock-colors" class="secondary" type="button" data-i18n="settings.clockColors.reset">恢复默认配色</button>
          </div>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.learn">学习模式</p>
          <label class="settings-item" for="reset-pins">
            <input id="reset-pins" type="checkbox" checked />
            <span data-i18n="settings.learn.resetPins">结束时将 pins 全部按下</span>
          </label>
          <label class="settings-item" for="show-strict-restore">
            <input id="show-strict-restore" type="checkbox" />
            <span data-i18n="settings.learn.showStrictRestore">显示 7simul flip 执行过程</span>
          </label>
          <label class="settings-item" for="hide-memo-initially">
            <input id="hide-memo-initially" type="checkbox" />
            <span data-i18n="settings.learn.hideMemo">初始隐藏记忆编码</span>
          </label>
          <div class="settings-item">
            <label for="memo-reveal-key-select" data-i18n="settings.learn.memoRevealKey">显示记忆编码快捷键：</label>
            <select id="memo-reveal-key-select">
              <option value="Space">Space</option>
              <option value="Enter">Enter</option>
            </select>
          </div>
          <label class="settings-item" for="show-memo-derivation">
            <input id="show-memo-derivation" type="checkbox" />
            <span data-i18n="settings.learn.showMemoDerivation">显示记忆编码推导</span>
          </label>
          <label class="settings-item" for="show-strict-details">
            <input id="show-strict-details" type="checkbox" checked />
            <span data-i18n="settings.learn.showStrictDetails">显示每一步状态图</span>
          </label>
          <label class="settings-item" for="show-ghost-hands">
            <input id="show-ghost-hands" type="checkbox" />
            <span data-i18n="settings.learn.showGhostHands">显示橙色虚线（上一步指针）</span>
          </label>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.diagram">状态图</p>
          <label class="settings-item" for="execute-on-back">
            <input id="execute-on-back" type="checkbox" checked />
            <span data-i18n="settings.diagram.executeOnBack">从背面开始记忆与执行（execute-on-back）</span>
          </label>
          <label class="settings-item" for="use-x2-flip">
            <input id="use-x2-flip" type="checkbox" />
            <span data-i18n="settings.diagram.useX2Flip">预览图使用 x2 翻转（而非 y2）</span>
          </label>
        </div>

        <div class="settings-section">
          <p class="settings-section-title" data-i18n="settings.trainer">记忆练习</p>
          <label class="settings-item" for="show-scramble-preview">
            <input id="show-scramble-preview" type="checkbox" />
            <span data-i18n="settings.trainer.showPreview">显示打乱后状态</span>
          </label>
          <div class="settings-item">
            <label for="confirm-key-select" data-i18n="settings.trainer.confirmKey">确认键：</label>
            <select id="confirm-key-select">
              <option value="Enter">Enter</option>
              <option value="Space">Space</option>
            </select>
          </div>
        </div>
      </aside>
    </div>

    <main class="container">
      <div class="header-row">
        <h1 data-i18n="page.h1">Clock 7simul Flip 学习助手</h1>
        <button id="settings-btn" class="settings-btn" type="button" data-i18n-title="settings.btn.title" title="设置"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/><line x1="15" y1="12" x2="20" y2="12"/><line x1="4" y1="12" x2="9" y2="12"/><line x1="15" y1="5" x2="20" y2="5"/><line x1="4" y1="5" x2="9" y2="5"/><line x1="15" y1="19" x2="20" y2="19"/><line x1="4" y1="19" x2="9" y2="19"/></svg></button>
      </div>

      <nav class="tab-bar">
        <button class="tab-btn" data-mode="trainer" data-i18n="tab.trainer">记忆练习</button>
        <button class="tab-btn active" data-mode="learn" data-i18n="tab.learn">学习模式</button>
        <button class="tab-btn" data-mode="generator" data-i18n="tab.generator">打乱生成</button>
      </nav>

      <div id="mode-learn" class="mode-container visible">

      <details id="custom-panel" class="panel collapsible-panel">
        <summary class="panel-toggle">
          <span data-i18n="learn.customPanel">输入自定义打乱</span>
          <button id="learn-generate" type="button" style="margin-left:auto;" data-i18n-title="learn.generate.title" title="生成练习打乱（快捷键 →）"><span data-i18n="learn.generate">生成打乱</span> <kbd>→</kbd></button>
        </summary>
        <form id="custom-form" class="custom-form-inner">
          <textarea
            id="custom-scramble"
            name="custom-scramble"
            data-i18n-placeholder="learn.placeholder"
            placeholder="例如：UR1- DR2+ DL0+ UL5- U3+ R2- D1+ L0+ ALL4- y2 U1+ R4- D2+ L3- ALL0+"
          ></textarea>
          <div class="inline">
            <button type="submit" data-i18n="learn.submit">渲染此打乱</button>
          </div>
        </form>
      </details>

      <div id="status" class="status"></div>

      <div class="learn-body">
        <ol id="output-list" class="list"></ol>

        <details id="history-panel" class="panel collapsible-panel learn-aside">
          <summary class="panel-toggle">
            <span data-i18n="learn.history">历史记录</span>
            <button id="clear-history" class="btn-danger" type="button" style="margin-left:auto;" data-i18n="learn.clearHistory">清空历史</button>
          </summary>
          <ul id="history-list" class="history-list"></ul>
        </details>
      </div>

      </div><!-- /mode-learn -->

      <div id="mode-generator" class="mode-container">
        <form id="gen-form">
          <label for="gen-count" data-i18n="gen.countLabel">生成条数：</label>
          <input id="gen-count" name="gen-count" type="number" min="1" max="200" value="5" />
          <button type="submit" data-i18n="gen.submit">生成</button>
          <button id="gen-copy-all" type="button" class="secondary icon-btn" disabled data-i18n-title="gen.copy.title" title="复制全部"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </form>
        <div id="gen-status" class="status"></div>
        <ol id="gen-output-list" class="list"></ol>
      </div><!-- /mode-generator -->

      <div id="mode-trainer" class="mode-container">

        <div id="trainer-scramble" class="trainer-scramble"></div>

        <div class="trainer-layout">
          <div class="trainer-main">
            <div id="trainer-preview" class="trainer-preview"></div>
            <div id="trainer-touch-zone" class="trainer-touch-zone">
              <div id="trainer-timer" class="trainer-timer color-idle">0.000</div>
              <div id="trainer-hint" class="trainer-hint" data-i18n="trainer.hint.idle">长按空格或触屏 1 秒准备计时</div>
            </div>
            <div id="trainer-result" class="trainer-result"></div>

            <div id="trainer-input-area" class="trainer-input-area">
              <input
                id="trainer-input"
                class="trainer-input"
                type="text"
                autocomplete="off"
                inputmode="none"
                data-i18n-placeholder="trainer.input.placeholder"
                placeholder="输入记忆码"
              />
              <div id="virtual-keypad" class="virtual-keypad">
                <div class="keypad-row">
                  <button type="button" class="keypad-key" data-key="1">1</button>
                  <button type="button" class="keypad-key" data-key="2">2</button>
                  <button type="button" class="keypad-key" data-key="3">3</button>
                  <button type="button" class="keypad-key" data-key="4">4</button>
                  <button type="button" class="keypad-key" data-key="5">5</button>
                  <button type="button" class="keypad-key" data-key="6">6</button>
                </div>
                <div class="keypad-row">
                  <button type="button" class="keypad-key" data-key="A">A</button>
                  <button type="button" class="keypad-key" data-key="B">B</button>
                  <button type="button" class="keypad-key" data-key="C">C</button>
                  <button type="button" class="keypad-key" data-key="D">D</button>
                  <button type="button" class="keypad-key" data-key="E">E</button>
                  <button type="button" class="keypad-key keypad-del" data-key="DEL">DEL</button>
                </div>
                <div class="keypad-row keypad-row-submit">
                  <button type="button" id="keypad-submit" class="keypad-key keypad-submit" data-i18n="trainer.keypad.submit">提交</button>
                </div>
              </div>
            </div>
          </div>

          <div class="trainer-sidebar">
            <div id="trainer-stats" class="trainer-stats"></div>

            <div class="trainer-results-header">
              <h3 data-i18n="trainer.results.title">成绩记录</h3>
              <button id="clear-results" class="btn-danger" type="button" data-i18n="trainer.results.clear">清空全部</button>
            </div>

            <ul id="trainer-results-list" class="trainer-results-list"></ul>
          </div>
        </div>

      </div><!-- /mode-trainer -->

    </main>

    <button id="back-to-top" class="back-to-top" type="button" data-i18n-title="backToTop.title" title="回到顶部">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script type="module" src="./app.js"></script>
  </body>
</html>
